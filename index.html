<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CosmoFlix</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="stars"></div>

    <header>
        <h1 class="logo">🌌 CosmoFlix</h1>

        <div class="header-right">

            <div class="search-box">
                <input
                    type="text"
                    id="search"
                    placeholder="Buscar filmes e séries..."
                >
            </div>

            <select id="filter">
                <option value="all">Todos</option>
                <option value="movie">Filmes</option>
                <option value="tv">Séries</option>
                <option value="horror">Terror</option>
                <option value="scifi">Sci-Fi</option>
            </select>

            <div id="profileContainer">
                <img id="profileAvatar"
                     src="https://i.pravatar.cc/150?img=5">

                <input type="file"
                       id="avatarInput"
                       accept="image/*"
                       hidden>
            </div>

        </div>
    </header>

    <!-- Banner -->
    <section id="banner">
        <div class="overlay">
            <h2 id="bannerTitle">Carregando...</h2>
            <p id="bannerDesc"></p>
        </div>
    </section>

    <!-- Categorias -->

    <section>
        <h2>🔥 Em Alta</h2>
        <div id="featured" class="row"></div>
    </section>

    <section>
        <h2>👻 Terror</h2>
        <div id="horror" class="row"></div>
    </section>

    <section>
        <h2>🌌 Sci-Fi</h2>
        <div id="scifi" class="row"></div>
    </section>

    <section>
        <h2>🧭 Aventura</h2>
        <div id="adventure" class="row"></div>
    </section>

    <section>
        <h2>❤️ Favoritos</h2>
        <div id="favorites" class="row"></div>
    </section>

    <!-- Modal -->

    <div id="modal">

        <div class="modal-content">

            <button id="closeBtn">✖</button>

            <img id="img">

            <h2 id="title"></h2>

            <p id="desc"></p>

            <div class="actions">
                <button id="favBtn">❤️ Favoritar</button>
            </div>

            <iframe
                id="trailer"
                width="100%"
                height="315"
                frameborder="0"
                allowfullscreen>
            </iframe>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
